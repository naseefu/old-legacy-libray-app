# ============================================================
# Legacy Library Management System — application.properties
# Spring Boot 2.3.x configuration style
# ============================================================

server.port=8080
spring.application.name=legacy-library-app

# --- H2 Database (old 1.4.200 — vulnerable) ---
spring.datasource.url=jdbc:h2:mem:librarydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# NOTE: In H2 2.x+, this URL format changed and INIT scripts need different syntax

# --- JPA / Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# NOTE: In Spring Boot 3 / Hibernate 6: H2Dialect moved, use org.hibernate.dialect.H2Dialect still ok
# but many other dialect class names changed (e.g., MySQL5InnoDBDialect → MySQLDialect)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# --- Flyway ---
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# --- Jackson ---
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
# Old property name — still works but some renamed in Boot 3
spring.jackson.mapper.default-view-inclusion=false

# --- JWT ---
jwt.secret=myLegacySecretKeyThatIs512BitsLongForHmacSha512AlgorithmUsedInOldJJWT091
jwt.expiration=86400

# --- Logging with Log4j2 (Log4Shell era) ---
logging.level.com.library=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# --- Swagger (Springfox) ---
# NOTE: spring.mvc.pathmatch.matching-strategy must be ANT_PATH_MATCHER for Springfox
# This was changed to PATH_PATTERN_PARSER as default in Spring Boot 2.6
# Springfox BREAKS without this workaround:
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# --- Cache ---
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=600s

# --- Security ---
# Old-style property — moved/renamed in Spring Security 6
spring.security.user.name=admin
spring.security.user.password=admin123
